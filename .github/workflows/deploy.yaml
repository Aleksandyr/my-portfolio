name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Opt into Node 24 for actions that still declare Node 20 (e.g. peaceiris) until they ship an update.
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Required so peaceiris/actions-gh-pages can push to gh-pages (default token is read-only otherwise).
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: alexkamenov.com